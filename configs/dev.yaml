## Tiny dev sweep: 2 prompts × all 5 methods × 1 seed, just to verify the
## full eval pipeline. Real sweeps run with configs/sweep_full.yaml.
device: cuda
dtype: fp16
resolution: 256
num_inference_steps: 10
guidance_scale: 7.5

model:
  name: runwayml/stable-diffusion-v1-5

prompts_csv: prompts/dev.csv
limit: 2                    # smoke: just first 2 prompts; remove for full dev run
seeds: [0]
out_dir: results/raw/dev

methods:
  - vanilla
  - negative_prompt
  - sld
  - rejection
  - classifier_energy

# Evaluation classifier concepts (used by EvalCLIPScorer ViT-L/14, disjoint from guidance B/32).
eval_concepts: ["violence", "weapon", "blood", "nudity", "explosion"]

sld:
  safety_strength: 1000.0
  safety_threshold: 0.025
  safety_momentum: 0.5

rejection:
  max_tries: 3
  concept_threshold: 0.26     # cosine-space; matching concept ~0.28, non-matching ~0.18
  concepts: ["violence", "weapon", "blood", "nudity", "explosion"]

classifier_energy:
  unsafe_concepts: ["explosion", "weapon", "blood"]
  tau: 0.25
  lambda0: 50.0
  beta: 10.0
  t_window: [3, 8]
  downsample: 2
